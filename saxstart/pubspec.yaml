name: saxstart
description: "SaxStart - Learn saxophone step by step"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Audio
  audioplayers: ^6.4.0
  permission_handler: ^11.4.0
  pitch_detector_dart: ^0.0.7
  record: ^5.2.1

  # UI Utilities
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

# App icon generation — run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/saxophone.png"
  min_sdk_android: 23
  background_color_android: "#0F0F0F"
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/images/saxophone.png"
  adaptive_icon_foreground_inset: 20
  remove_alpha_ios: true

# Native splash screen — run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0F0F0F"
  image: "assets/images/saxophone.png"
  color_dark: "#0F0F0F"
  image_dark: "assets/images/saxophone.png"
  android_12:
    color: "#0F0F0F"
    image: "assets/images/saxophone.png"
    color_dark: "#0F0F0F"
    image_dark: "assets/images/saxophone.png"
  android: true
  ios: true
  web: false
  fullscreen: false

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/audio/notes/
    - assets/images/
    - assets/images/onboarding/
    - assets/animations/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
